<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FREE MOTION - Абонементы</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="/assets/icons/icon.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-abonements.png">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/login/login.css">
</head>

<div class="topbar"></div>

<body>
    <div class="card">
        <div class="brand">
            <img class="logo" src="/assets/icons/logo-2.png">
            <div class="titles">
                <p class="title">FREE MOTION</p>
                <p class="subtitle">Абонементы</p>
            </div>
        </div>
        <form>
            <p>Вход в систему</p>
            <div class="input">
                <input class="login" type="text" required placeholder="">
                <label for="login">Логин</label>
            </div>
            <div class="input">
                <input class="password" type="password" required placeholder="">
                <label for="password">Пароль</label>
            </div>
            <button type="submit">Войти</button>
            <p class="error">Неверный логин или пароль</p>
        </form>
    </div>

    <script type="module" src="/abonements/abonements.js"></script>
</body>

<div class="bottombar"></div>

</html>
