<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE MOTION - Расписание</title>
    <meta name="theme-color" content="#9526c0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link id="favicon" rel="icon" href="/assets/icons/icon.png">
    <link rel="apple-touch-icon" href="/assets/icons/icon-schedule.png">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/schedule.css">
</head>

<body>
    <div id="loader">
        <img id="loader-logo" src="/assets/icons/icon.png" >
    </div>

    <header>
        <div class="header">
            <div class="brand">
                <img src="/assets/icons/logo.png">
                <div class="titles">
                    <p class="title">FREE MOTION</p>
                    <p class="subtitle">Расписание</p>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="card-header">
                <p class="card-title">Зал 1</p>
            </div>
            <div class="card-table">
                <div class="table-title date">Дата</div>
                <div class="table-title time">Время</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <p class="card-title">Зал 2</p>
            </div>
            <div class="card-table">
                <div class="table-title date">Дата</div>
                <div class="table-title time">Время</div>
            </div>
        </div>
    </main>

    <footer>
        <p>FREE MOTION - Расписание</p>
    </footer>

    <div class="popup">
        <div class="popup-card">
            <div class="popup-titles">
                <div class="popup-title"></div>
                <div class="popup-subtitle"></div>
            </div>
            <div class="popup-button"></div>
        </div>
    </div>

    <div class="modal">
        <div class="modal-card">
            <div class="modal-titles">
                <div class="modal-title"></div>
                <div class="modal-subtitle"></div>
            </div>
            <div class="modal-button">
                <button class="modal-yes"></button>
                <button class="modal-no"></button>
            </div>
        </div>
    </div>

    <script type="module" src="/assets/js/schedule.js"></script>

    <script>
        const hour = new Date().getHours();
        if (hour >= 20 || hour < 8) {
        // if (hour < 18) {    
            document.documentElement.classList.add('dark');
            document.getElementById("favicon").href = "/assets/icons/icon-dark.png";
            document.getElementById("loader-logo").src = "/assets/icons/icon-dark.png";
        }
    </script>
</body>

</html>
